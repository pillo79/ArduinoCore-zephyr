# CI workflow to check formatting
name: 'Format Check'

on:
  push:
  pull_request:

jobs:
  verify-format:
    runs-on: ubuntu-latest
    steps:
      - name: Install clang
        working-directory: /opt
        run: |
          sudo apt-get remove --purge man-db -y # skips the mandb triggers
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-19
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false
      - name: Get changed source files that need format check
        id: changed-files
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46.0.5
        with:
          files: |
            cores/arduino/**/*.{c,cpp,h,hpp}
            loader/**/*.{c,cpp,h,hpp}
            libraries/**/*.{c,cpp,h,hpp}
          files_ignore: |
            cores/arduino/api/**
            loader/blobs/4343WA1_*.c
            loader/blobs/wifi_nvram_image.h
            libraries/examples/**
            libraries/extras/**
            libraries/ea_malloc/**
          json: true
      - name: Run clang-format checks
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo ${{ steps.changed-files.outputs.all_changed_files }} | jq -r '.[]' > all_changed_files.txt
          ./extra/ci_clang_check.sh -f all_changed_files.txt
