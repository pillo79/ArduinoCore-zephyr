name: Report size deltas

on:
  workflow_run:
    workflows: ["Package, test and upload core"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: arduino/report-size-deltas@v1.1.0
